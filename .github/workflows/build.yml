# .github/workflows/build.yml
#
# Roda o build de minificação antes de cada deploy no Vercel.
# O Vercel serve dist/index.html — código minificado, nunca o src/.
#
# Fluxo:
#   git push → GitHub Actions roda build.mjs → commit dist/ → Vercel deploya

name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'build.mjs'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (minify)
        run: npm run build

      - name: Commit dist/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "build: minify [skip ci]"
          git push
