  --c-teal: #0D9488; --c-teal-light: #F0FDFA;
  /* Superfícies */
  --c-bg: #F0F4F8; --c-card: #fff;
  /* Bordas */
  --c-border-1: #BFDBFE; --c-border-2: #CBD5E1; --c-border-3: #E2E8F0;
  /* Texto */
  --c-text: #0F172A; --c-muted: #64748B; --c-hint: #94A3B8;
  /* Raios e Sombras */
  --radius: 10px; --radius-lg: 14px;
  --shadow-sm: 0 1px 3px rgba(15,23,42,.06), 0 2px 8px rgba(15,23,42,.04);
  --shadow-md: 0 4px 16px rgba(15,23,42,.10), 0 1px 4px rgba(15,23,42,.06);
  --shadow-lg: 0 12px 32px rgba(15,23,42,.14), 0 2px 8px rgba(15,23,42,.08);
  /* Tipografia */
  --font-display: 'Calistoga', serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  /* Transições */
  --ease-md: cubic-bezier(.4,0,.2,1);
  --t-fast: all .15s var(--ease-md);
  --t-std: all .25s var(--ease-md);
  --t-slow: all .35s var(--ease-md);
}

/* ═══ TOKENS ═══════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --P:#2563EB;--PLt:#EFF6FF;--PDk:#1E40AF;
  --navy:#0A1628;--navy2:#0F1E35;--navy3:#162340;
  --G:#15803d;--GLt:#f0fdf4;--GDk:#166534;
  --R:#DC2626;--RLt:#fef2f2;--RDk:#991b1b;
  --A:#D97706;--ALt:#FFFBEB;
  --O:#EA580C;
  --Pu:#7C3AED;--PuLt:#F5F3FF;
  --Te:#0D9488;--TeLt:#F0FDFA;
  --bg:#F0F4F8;--card:#fff;
  --b1:#BFDBFE;--b2:#CBD5E1;--b3:#E2E8F0;
  --tx:#0F172A;--mu:#64748B;--hi:#94A3B8;
  --r:10px;--rLg:14px;
  --s0:0 1px 3px rgba(15,23,42,.06),0 2px 8px rgba(15,23,42,.04);
  --s1:0 4px 16px rgba(15,23,42,.10),0 1px 4px rgba(15,23,42,.06);
  --s2:0 12px 32px rgba(15,23,42,.14),0 2px 8px rgba(15,23,42,.08);
  --fd:'Calistoga',serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);font-size:13px;line-height:1.5;min-height:100vh}
select,button,input{font-family:inherit}
button{cursor:pointer}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:4px}

/* ═══ ANIM ══════════════════════════════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fu{animation:fadeUp .2s ease both}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;transition-duration:.01ms!important}
  .fu{animation:none}
}

/* ═══ SKIP ══════════════════════════════════════════════════ */
.skip{position:absolute;left:-9999px;top:4px;z-index:9999;padding:6px 14px;background:var(--P);color:#fff;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none}
.skip:focus{left:4px}

/* ═══ HEADER ════════════════════════════════════════════════ */
.hdr{background:linear-gradient(135deg,var(--navy) 0%,var(--navy3) 60%,#1a2e4a 100%);position:sticky;top:0;z-index:200}
.hdr::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 55% 80% at 72% 50%,rgba(37,99,235,.16) 0%,transparent 70%)}
.hdr-in{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;padding:12px 24px 10px}
.hdr-l{display:flex;align-items:center;gap:11px}
.hdr-ic{width:36px;height:36px;background:linear-gradient(135deg,#2563EB,#1d4ed8);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 4px 12px rgba(37,99,235,.4);flex-shrink:0}
.hdr h1{font-family:var(--fd);color:#fff;font-size:22px;font-weight:400;line-height:1.15}
.hdr-sub{color:#93c5fd;font-size:10.5px;margin-top:1px;font-family:var(--fm)}
.hdr-sub b{color:#BFDBFE;font-weight:500}
.hdr-r{display:flex;align-items:center;gap:6px}
.hchip{padding:3px 10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;font-size:10px;color:#93c5fd;font-family:var(--fm)}
.hchip.live{background:rgba(21,128,61,.22);border-color:rgba(21,128,61,.35);color:#86efac}
.hchip.live::before{content:'';display:inline-block;width:5px;height:5px;background:#4ade80;border-radius:50%;margin-right:5px;animation:pulse 2s infinite}
.hdr-sep{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),rgba(37,99,235,.3),rgba(255,255,255,.1),transparent)}

/* ═══ FILTROS ═══════════════════════════════════════════════ */
.filters{background:var(--card);border-bottom:1px solid var(--b3);padding:6px 24px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;position:sticky;top:58px;z-index:190;box-shadow:0 2px 8px rgba(15,23,42,.04)}
.flbl{font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.7px;white-space:nowrap;font-family:var(--fm)}
.fsel{border:1.5px solid var(--b2);border-radius:7px;padding:3px 7px;font-size:11px;color:var(--tx);background:#F8FAFC;outline:none;cursor:pointer;font-weight:500;transition:border-color .12s,box-shadow .12s,background .12s;max-width:160px}
.fsel.restrito{border-color:var(--b1);background:var(--PLt);color:var(--PDk);font-weight:600}
.fsel.restrito:focus{border-color:var(--P)}
.fsel:focus{border-color:var(--P);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.fsep{width:1px;height:20px;background:var(--b3);margin:0 2px}
.ftog{display:flex;border:1.5px solid var(--b2);border-radius:7px;overflow:hidden}
.ftog button{padding:3px 10px;font-size:11px;border:none;font-weight:600;transition:all .12s;background:#F8FAFC;color:var(--mu)}
.ftog button.on{background:var(--navy2);color:#fff}
.ftog button:not(:last-child){border-right:1px solid var(--b2)}
.btn-cl{display:none;padding:3px 10px;background:#FEF2F2;color:#DC2626;border:1.5px solid #FECACA;border-radius:7px;font-size:11px;font-weight:700}
.btn-cl:hover{background:#FEE2E2}
.sw{position:relative}.sw-ic{position:absolute;left:7px;top:50%;transform:translateY(-50%);color:var(--hi);font-size:11px;pointer-events:none}
.si{border:1.5px solid var(--b2);border-radius:7px;padding:3px 7px 3px 22px;font-size:11px;color:var(--tx);background:#F8FAFC;outline:none;width:140px;transition:all .15s}
.si:focus{border-color:var(--P);box-shadow:0 0 0 3px rgba(37,99,235,.08);width:170px}
.si::placeholder{color:var(--hi)}

/* ═══ TABS MÊS + TOOLBAR ════════════════════════════════════ */
.mes-bar{background:var(--card);border-bottom:1px solid var(--b3);padding:0 24px;display:flex;align-items:center;justify-content:space-between;gap:8px;position:sticky;top:98px;z-index:180;box-shadow:0 1px 4px rgba(15,23,42,.04)}
.mes-tabs{display:flex;gap:2px}
.mtab{padding:8px 18px;font-size:12px;background:none;border:none;border-bottom:3px solid transparent;color:var(--mu);font-weight:500;transition:all .12s;margin-bottom:-1px;border-radius:6px 6px 0 0;white-space:nowrap}
.mtab:hover{color:var(--tx);background:#F1F5F9}
.mtab.on{font-weight:700;color:var(--PDk);border-bottom-color:var(--P);background:var(--PLt)}
.toolbar-r{display:flex;align-items:center;gap:6px;padding:6px 0}
.view-lbl{font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;font-family:var(--fm);white-space:nowrap}
.view-sel{padding:3px 9px;font-size:11px;font-weight:600;border:1.5px solid var(--P);border-radius:7px;background:#fff;color:var(--PDk);cursor:pointer;outline:none;transition:all .12s}
.view-sel:hover{background:var(--PLt)}
.chart-btn{display:flex;align-items:center;gap:5px;padding:4px 12px;background:var(--navy2);color:#fff;border:none;border-radius:7px;font-size:11px;font-weight:600;transition:all .15s;white-space:nowrap}
.chart-btn:hover{background:var(--navy3)}
.chart-btn.on{background:var(--P);box-shadow:0 0 0 3px rgba(37,99,235,.18)}

/* ═══ GRÁFICOS PAINEL ════════════════════════════════════════ */
.cp{overflow:hidden;max-height:0;opacity:0;pointer-events:none;transition:max-height .35s ease,opacity .25s ease}
.cp.open{max-height:680px;opacity:1;pointer-events:auto}
.cp-in{background:var(--navy2);border-bottom:2px solid rgba(37,99,235,.3);padding:14px 24px}
.cp-nav{display:flex;align-items:center;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.cp-lbl{font-size:10px;font-weight:700;color:#93c5fd;text-transform:uppercase;letter-spacing:.7px;font-family:var(--fm);margin-right:4px}
.cpill{padding:3px 12px;border-radius:20px;border:1.5px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:#93c5fd;font-size:11px;font-weight:600;transition:all .15s;cursor:pointer}
.cpill.on{background:var(--P);border-color:var(--P);color:#fff}
.cpill:hover:not(.on){background:rgba(255,255,255,.1);color:#fff}
.cbox{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:var(--r);padding:14px;display:none}
.cbox.on{display:block}
.cbox canvas{max-height:300px}
.clg{display:flex;align-items:center;gap:12px;margin-top:9px;flex-wrap:wrap}
.cli{display:flex;align-items:center;gap:4px;font-size:11px;color:#93c5fd}
.cld{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ═══ ZONA FIXA — KPIs sempre visíveis ══════════════════════ */
#fixed-zone{padding:12px 24px;display:flex;flex-direction:column;gap:12px;background:var(--bg)}

/* ═══ ABAS SECUNDÁRIAS ══════════════════════════════════════ */
.sec-tabs-bar{background:var(--card);border-bottom:2px solid var(--b3);padding:0 24px;display:flex;gap:0;overflow-x:auto;position:sticky;top:138px;z-index:170;box-shadow:0 2px 8px rgba(15,23,42,.06)}
.stab{padding:10px 20px;font-size:12px;background:none;border:none;border-bottom:3px solid transparent;color:var(--mu);font-weight:500;transition:all .12s;margin-bottom:-2px;white-space:nowrap;display:flex;align-items:center;gap:6px}
.stab:hover{color:var(--tx);background:#F8FAFC}
.stab.on{font-weight:700;color:var(--PDk);border-bottom-color:var(--P);background:var(--PLt)}
.stab-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;font-family:var(--fm)}

/* ═══ PAINEL SECUNDÁRIO ═════════════════════════════════════ */
#sec-panel{padding:14px 24px;min-height:300px}
.spanel{display:none}
.spanel.on{display:block}

/* ═══ LAYOUT UTILITÁRIOS ════════════════════════════════════ */
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.sbar{width:3px;height:18px;border-radius:2px;flex-shrink:0}
.stit{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;font-family:var(--fm)}
.shin{font-size:11px;color:var(--hi)}
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:600;letter-spacing:.3px;font-family:var(--fm)}
.cbl{background:var(--PLt);color:var(--PDk);border:1px solid var(--b1)}
.crd{background:var(--RLt);color:var(--RDk)}
.cgr{background:var(--GLt);color:var(--GDk)}
.cam{background:var(--ALt);color:#92400E}
.cpu{background:var(--PuLt);color:var(--Pu)}

/* ═══ KPI GRID ══════════════════════════════════════════════ */
.kg7{display:grid;grid-template-columns:114px repeat(6,1fr);gap:9px}
.kg5{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
.kc{background:var(--card);border:1px solid var(--b3);border-radius:var(--r);padding:12px 13px;box-shadow:var(--s0);transition:box-shadow .15s,transform .15s;position:relative;overflow:hidden}
.kc::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.kc:hover{box-shadow:var(--s1);transform:translateY(-1px)}
.kc-lb{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--mu);margin-bottom:6px;font-family:var(--fm);display:flex;align-items:center;gap:4px}
.kc-v{font-size:25px;font-weight:700;line-height:1;letter-spacing:-1px;font-family:var(--fd)}
.kc-s{font-size:11px;color:var(--hi);margin-top:3px}
.kb{background:var(--PLt);border-color:var(--b1)}.kb::after{background:var(--P)}
.kg{background:var(--GLt);border-color:#BBF7D0}.kg::after{background:var(--G)}
.kr{background:var(--RLt);border-color:#FECACA}.kr::after{background:var(--R)}
.kgr2{background:#F8FAFC}.kgr2::after{background:var(--mu)}
.kam{background:var(--ALt);border-color:#FDE68A}.kam::after{background:var(--A)}
.tt-w:hover .tt{visibility:visible;opacity:1}
.sb{border-radius:var(--r);padding:12px 13px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:var(--s0);border:1px solid transparent;transition:box-shadow .15s,transform .15s}
.sb:hover{box-shadow:var(--s1);transform:translateY(-1px)}
.sb-lb{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;font-family:var(--fm)}
.sb-v{font-size:25px;font-weight:700;line-height:1;letter-spacing:-1px;font-family:var(--fd)}
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin-top:5px;letter-spacing:.3px;font-family:var(--fm)}
.bok{background:#DCFCE7;color:#166534}
.bwn{background:#FEF9C3;color:#854D0E}
.bct{background:#FEE2E2;color:#991b1b}
.gw{background:var(--card);border:1px solid var(--b3);border-radius:var(--r);padding:10px 7px 7px;box-shadow:var(--s0);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.gw:hover{box-shadow:var(--s1)}
.gd{position:relative;width:66px;height:66px}
.gp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;font-family:var(--fm)}
.gl{font-size:9px;font-weight:700;color:var(--mu);text-align:center;text-transform:uppercase;letter-spacing:.5px;font-family:var(--fm)}

/* ═══ AGING ═════════════════════════════════════════════════ */
.ag5{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
.agc{border-radius:var(--r);padding:12px 13px;cursor:pointer;transition:transform .12s,box-shadow .12s;position:relative;border:1.5px solid transparent;box-shadow:var(--s0)}
.agc:hover{transform:translateY(-2px);box-shadow:var(--s1)}
.agc.sel{box-shadow:0 0 0 2.5px var(--navy),var(--s1)!important;transform:translateY(-2px)}
.agc.nc{cursor:default}
.agc.nc:hover{transform:none;box-shadow:var(--s0)}
.ag-ht{position:absolute;top:6px;right:8px;font-size:9px;font-weight:600;opacity:.5;font-family:var(--fm)}
.ag-lb{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--mu);margin-bottom:4px;font-family:var(--fm)}
.ag-v{font-size:22px;font-weight:700;letter-spacing:-1px;font-family:var(--fd)}
.ag-p{font-size:10px;color:var(--mu);margin-top:3px;font-family:var(--fm)}
.ag-b{height:3px;border-radius:2px;margin-top:7px;opacity:.5}

/* ═══ INSIGHTS ══════════════════════════════════════════════ */
.ins-g{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ins-c{background:var(--card);border:1px solid var(--b3);border-radius:var(--r);padding:14px;box-shadow:var(--s0);position:relative;overflow:hidden}
.ins-c::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%}
.ins-c.alt::before{background:var(--R)}
.ins-c.wrn::before{background:var(--A)}
.ins-c.gd::before{background:var(--G)}
.ins-c.inf::before{background:var(--P)}
.ins-hd{display:flex;align-items:flex-start;gap:7px;margin-bottom:7px}
.ins-ic{font-size:17px;flex-shrink:0;line-height:1.3}
.ins-tt{font-size:12px;font-weight:700;color:var(--tx);line-height:1.3}
.ins-bd{font-size:11px;color:var(--mu);line-height:1.6;margin-bottom:9px}
.ins-tg{display:flex;gap:4px;flex-wrap:wrap}

/* ═══ BAR ROW ═══════════════════════════════════════════════ */
.br{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.br-lb{font-size:11px;color:var(--tx);width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.br-bg{flex:1;background:#F1F5F9;border-radius:4px;height:17px;overflow:hidden}
.br-f{height:100%;border-radius:4px;transition:width .4s ease}
.br-n{font-size:11px;font-weight:700;width:44px;text-align:right;flex-shrink:0;font-family:var(--fm)}
.br-p{font-size:10px;color:var(--mu);width:36px;text-align:right;flex-shrink:0}

/* ═══ REGIÃO GRID ════════════════════════════════════════════ */
.rg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:10px}
.rg-c{background:var(--card);border:1px solid var(--b3);border-radius:var(--r);padding:13px 15px;box-shadow:var(--s0);transition:box-shadow .15s}
.rg-c:hover{box-shadow:var(--s1)}
.rg-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.rg-nm{font-size:13px;font-weight:700;font-family:var(--fd)}
.rg-kp{display:grid;grid-template-columns:1fr 1fr;gap:3px 10px;margin-bottom:9px}
.rg-kv{font-size:11px;color:var(--mu)}
.rg-kv b{color:var(--tx);font-weight:700}
.rg-uf-lbl{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;font-family:var(--fm);margin-bottom:4px}
.rg-uf-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--b3)}
.rg-uf-row:last-child{border:none}

/* ═══ TABELA ════════════════════════════════════════════════ */
.tw{background:var(--card);border:1px solid var(--b3);border-radius:var(--r);box-shadow:var(--s0);overflow:hidden}
.th{padding:9px 13px;border-bottom:1px solid var(--b3);display:flex;align-items:center;justify-content:space-between;background:#F8FAFC;flex-wrap:wrap;gap:7px}
.vbtn{padding:3px 9px;font-size:11px;border-radius:6px;border:1.5px solid var(--b2);background:#F1F5F9;color:var(--mu);font-weight:600;transition:all .12s}
.vbtn:hover{border-color:#94A3B8;color:var(--tx)}
.vbtn.on{background:var(--navy2);color:#fff;border-color:var(--navy2)}
table{width:100%;border-collapse:collapse;font-size:11px;table-layout:auto}
caption{display:none}
thead th{padding:5px 6px;font-weight:600;font-size:9.5px;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;color:#fff;cursor:pointer;user-select:none;font-family:var(--fm)}
thead th:hover{opacity:.85}
tbody td{padding:5px 6px;border-bottom:1px solid #F1F5F9;white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#EFF6FF!important}
.tf{padding:7px 13px;border-top:1px solid var(--b3);background:#F8FAFC;font-size:10px;color:var(--hi);font-family:var(--fm)}
.tr-dest{background:#FFFBEB!important;border-left:3px solid #F59E0B}
.tr-click:hover{background:#EFF6FF!important;transition:background .1s}
.tr-aten{opacity:.38}
.tr-dest td:first-child{padding-left:9px}
.dh-inp{width:52px;padding:3px 6px;font-size:11px;font-weight:700;border:1.5px solid var(--A);border-radius:6px;background:#FFFBEB;color:#92400E;outline:none;text-align:center;transition:border-color .12s}
.dh-inp:focus{border-color:#F59E0B;box-shadow:0 0 0 3px rgba(245,158,11,.15)}
.dh-inp::placeholder{color:#D97706;opacity:.6}
.part-bar{display:inline-flex;align-items:center;gap:3px;font-family:var(--fm)}
.part-bg{width:32px;height:5px;background:#F1F5F9;border-radius:3px;overflow:hidden;flex-shrink:0}
.part-f{height:100%;border-radius:4px}
.nr{padding:30px;text-align:center;color:var(--hi)}
.nr b{display:block;font-size:14px;color:var(--mu);margin-bottom:4px}

/* ═══ ENHANCEMENTS (limpeza v66) ════════════════════════════ */
/* ── Tooltip material (nativo aprimorado) ──────────────── */
[data-tooltip]{position:relative;}
[data-tooltip]::before{
  content:attr(data-tooltip);
  position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%) scale(.95);
  background:rgba(15,23,42,.88);color:#f1f5f9;
  font-size:10px;font-family:var(--fm);
  padding:4px 9px;border-radius:6px;white-space:nowrap;
  pointer-events:none;opacity:0;
  transition:opacity .15s cubic-bezier(.4,0,.2,1),transform .15s cubic-bezier(.4,0,.2,1);
  box-shadow:var(--md-s2);z-index:999;
  border:1px solid rgba(255,255,255,.1);
}
[data-tooltip]::after{
  content:"";position:absolute;bottom:calc(100% + 2px);left:50%;transform:translateX(-50%);
  border:4px solid transparent;border-top-color:rgba(15,23,42,.88);
  pointer-events:none;opacity:0;
  transition:opacity .15s cubic-bezier(.4,0,.2,1);
}
[data-tooltip]:hover::before,[data-tooltip]:hover::after{opacity:1;transform:translateX(-50%) scale(1);}


/* ── Spinner de loading (Material) ────────────────────── */
@keyframes md-spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}
@keyframes md-spin-dash{
  0%{stroke-dasharray:1px,200px;stroke-dashoffset:0;}
  50%{stroke-dasharray:100px,200px;stroke-dashoffset:-15px;}
  100%{stroke-dasharray:100px,200px;stroke-dashoffset:-125px;}
}
.md-spinner{
  display:inline-block;width:20px;height:20px;
  animation:md-spin 1.4s linear infinite;
  vertical-align:middle;
}
.md-spinner circle{
  stroke:var(--P);fill:none;stroke-width:3;
  stroke-linecap:round;
  animation:md-spin-dash 1.4s ease-in-out infinite;
  stroke-dasharray:80px,200px;stroke-dashoffset:-15px;
}
/* ── Bar chart animação de entrada ─────────────────────── */
@keyframes bar-grow{from{transform:scaleX(0);}to{transform:scaleX(1);}}
.br-f{animation:bar-grow .6s cubic-bezier(.4,0,.2,1) both;transform-origin:left center;}

html{scroll-behavior:smooth;}
::selection{background:rgba(37,99,235,.18);color:var(--tx);}
/* ── Insights Redesign v28 ─────────────────────────────────── */

  .filters,.mes-bar,#fixed-zone,#sec-panel{padding-left:14px;padding-right:14px}
  .sec-tabs-bar{padding:0 14px}
}


/* ═══ UTILITY CLASSES (reduzem inline styles) ════════════════ */
.c-gdark{color:var(--GDk)}.c-rdark{color:var(--RDk)}.c-muted{color:var(--mu)}.c-hint{color:var(--hi)}
.c-blue-d{color:#1D4ED8}.c-purple-d{color:#7C3AED}
.fw6{font-weight:600}.fw7{font-weight:700}.fm{font-family:var(--fm)}
.tar{text-align:right}.tal{text-align:left}.tac{text-align:center}
.fs10{font-size:10px}.fs11{font-size:11px}.fs12{font-size:12px}
.flex{display:flex}.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}
.aic{align-items:center}.jcsb{justify-content:space-between}
.mb4{margin-bottom:4px}.mb6{margin-bottom:6px}.mb8{margin-bottom:8px}


/* ═══ MOBILE RESPONSIVE ═══════════════════════════════════════ */
@media(max-width:768px){
  .hdr-in{flex-wrap:wrap;gap:8px;padding:10px 16px 8px}
  .hdr-l{width:100%;justify-content:center}
  .hdr-r{width:100%;justify-content:center;flex-wrap:wrap;gap:4px}
  .filters{padding:6px 12px;gap:4px}
  .fsel,.si{font-size:10px;max-width:120px}
  .mes-bar{padding:0 12px;flex-wrap:wrap}
  .toolbar-r{width:100%;justify-content:center}
  .kg7{grid-template-columns:1fr 1fr !important;gap:6px}
  .kg7 .gw{grid-column:1/-1}
  .kg5{grid-template-columns:1fr 1fr !important;gap:6px}
  .ag5{grid-template-columns:1fr 1fr !important;gap:6px}
  .ag5 .agc:last-child{grid-column:1/-1}
  .sec-tabs-bar{padding:0 8px}
  .stab{padding:8px 10px;font-size:11px}
  .ev-g{grid-template-columns:1fr !important}
  .ins-cards{grid-template-columns:1fr !important}
  .rg-grid{grid-template-columns:1fr !important}
  .tr-grid{grid-template-columns:1fr !important}
  .cq-grid{grid-template-columns:1fr 1fr !important}
  #fixed-zone{padding:8px 12px}
  #sec-panel{padding:8px 12px}
  .br-lb{width:120px;font-size:10px}
  .mo-b{width:98vw}
}
@media(max-width:480px){
  .kg7{grid-template-columns:1fr !important}
  .kg5{grid-template-columns:1fr !important}
  .ag5{grid-template-columns:1fr !important}
  .cq-grid{grid-template-columns:1fr !important}
  .hdr h1{font-size:18px}
  .stab{padding:6px 8px;font-size:10px}
  .stab-badge{display:none}
  .mes-tabs{overflow-x:auto;flex-wrap:nowrap}
  .mtab{padding:6px 12px;font-size:11px}
}


/* ═══ DRILL-DOWN MODAL ════════════════════════════════════════ */
.dd-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:999;overflow-y:auto;padding:20px}
.dd-overlay.show{display:flex;align-items:flex-start;justify-content:center}
.dd-box{background:var(--card);border-radius:12px;max-width:900px;width:100%;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.dd-hd{padding:14px 20px;border-bottom:1px solid var(--b3);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--card);z-index:1;border-radius:12px 12px 0 0}
.dd-title{font-size:14px;font-weight:700;font-family:var(--fb)}
.dd-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--mu);padding:4px 8px}
.dd-close:hover{color:var(--tx)}
.dd-body{padding:14px 20px}
.dd-tbl{width:100%;font-size:11px;border-collapse:collapse}
.dd-tbl th{background:#334155;color:#fff;padding:6px 10px;text-align:left;font-size:10px;font-weight:600;position:sticky;top:0}
.dd-tbl td{padding:5px 10px;border-bottom:1px solid var(--b3)}
.dd-tbl tr:hover td{background:rgba(37,99,235,.04)}
.dd-count{font-size:11px;color:var(--mu);padding:10px 20px;border-top:1px solid var(--b3)}
body.dark .dd-box{background:var(--c-card)}
body.dark .dd-hd{background:var(--c-card)}
body.dark .dd-tbl th{background:#1E293B}

  --c-bg: #0B1120; --c-card: #111827;
  --c-border-1: #1E3A5F; --c-border-2: #334155; --c-border-3: #1E293B;
  --c-text: #E2E8F0; --c-muted: #94A3B8; --c-hint: #64748B;
  --c-primary-light: #1E3A5F; --c-success-light: #052E16; --c-danger-light: #450A0A;
  --c-warning-light: #451A03; --c-purple-light: #2E1065; --c-teal-light: #042F2E;
  --bg: var(--c-bg); --card: var(--c-card);
  --b1: var(--c-border-1); --b2: var(--c-border-2); --b3: var(--c-border-3);
  --tx: var(--c-text); --mu: var(--c-muted); --hi: var(--c-hint);
  --PLt: var(--c-primary-light); --GLt: var(--c-success-light); --RLt: var(--c-danger-light);

}

body.dark .mes-bar { background: var(--c-card); border-color: var(--c-border-3); }
body.dark .sec-tabs-bar { background: var(--c-card); border-color: var(--c-border-3); }

/* ═══ ALERT BAR ═══════════════════════════════════════════════ */
#alert-bar{display:none;background:linear-gradient(90deg,#7F1D1D,#991b1b);padding:6px 24px;font-size:11px;color:#fca5a5;font-family:var(--fm);overflow:hidden;white-space:nowrap}
#alert-bar.show{display:flex;align-items:center;gap:12px}
#alert-bar .alert-dot{width:6px;height:6px;background:#f87171;border-radius:50%;animation:pulse 1.5s infinite;flex-shrink:0}
#alert-bar .alert-text{flex:1;overflow:hidden;text-overflow:ellipsis}
#alert-bar .alert-close{background:none;border:none;color:#fca5a5;cursor:pointer;font-size:14px;padding:2px 6px;opacity:.7}
#alert-bar .alert-close:hover{opacity:1}
body.dark #alert-bar{background:linear-gradient(90deg,#450A0A,#7F1D1D)}


/* ═══ CIDADE QUADRANTE ════════════════════════════════════════ */
.cq-container{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.cq-btn{padding:4px 12px;font-size:11px;font-weight:600;border-radius:6px;border:1px solid var(--b2);background:var(--card);color:var(--mu);cursor:pointer;transition:all .12s;font-family:var(--fb)}
.cq-btn.on{background:var(--navy2);color:#fff;border-color:var(--navy2)}
.cq-btn:hover:not(.on){background:var(--b3)}
body.dark .cq-btn{background:#1E293B;border-color:var(--c-border-2);color:var(--c-muted)}
body.dark .cq-btn.on{background:var(--c-primary);color:#fff}
.cq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.cq-card{background:var(--card);border:1.5px solid var(--b3);border-radius:var(--r);padding:12px;cursor:pointer;transition:all .12s;position:relative;overflow:hidden}
.cq-card:hover{box-shadow:var(--s1);transform:translateY(-1px)}
.cq-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.cq-card.q1::before{background:var(--G)} .cq-card.q2::before{background:var(--R)}
.cq-card.q3::before{background:var(--A)} .cq-card.q4::before{background:var(--Te)}
body.dark .cq-card{background:var(--c-card);border-color:var(--c-border-3)}
.cq-name{font-size:12px;font-weight:600;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cq-stats{display:flex;gap:8px;font-size:10px;font-family:var(--fm);color:var(--mu)}
.cq-stat-val{font-weight:700;font-size:13px}

/* ═══ AUTH / LOGIN MODAL ═══════════════════════════════════ */
.auth-overlay{display:none;position:fixed;inset:0;background:rgba(10,22,40,.85);z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.auth-overlay.show{display:flex}
.auth-box{background:var(--card);border-radius:16px;padding:32px 28px;width:min(380px,90vw);box-shadow:0 24px 64px rgba(0,0,0,.35);animation:fadeUp .25s ease}
body.dark .auth-box{background:var(--navy2);border:1px solid rgba(255,255,255,.1)}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.auth-logo-ic{width:40px;height:40px;background:linear-gradient(135deg,#2563EB,#1d4ed8);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 12px rgba(37,99,235,.4)}
.auth-logo h2{font-family:var(--fd);font-size:18px;color:var(--tx)}
body.dark .auth-logo h2{color:#fff}
.auth-msg{font-size:12px;color:var(--mu);margin-bottom:16px;line-height:1.5}
.auth-field{margin-bottom:12px}
.auth-field label{display:block;font-size:10px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.6px;font-family:var(--fm);margin-bottom:4px}
.auth-field input{width:100%;padding:8px 12px;border:1.5px solid var(--b2);border-radius:8px;font-size:13px;background:#F8FAFC;color:var(--tx);outline:none;transition:all .15s;font-family:var(--fb)}
body.dark .auth-field input{background:var(--navy3);border-color:rgba(255,255,255,.15);color:#e2e8f0}
.auth-field input:focus{border-color:var(--P);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.auth-btn{width:100%;padding:10px;background:var(--P);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:4px}
.auth-btn:hover{background:var(--PDk)}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-err{font-size:11px;color:var(--R);margin-top:8px;display:none;font-family:var(--fm)}
.auth-err.show{display:block}
.auth-toggle{text-align:center;margin-top:14px;font-size:11px;color:var(--mu)}
.auth-toggle a{color:var(--P);cursor:pointer;font-weight:600;text-decoration:none}
.auth-toggle a:hover{text-decoration:underline}
.auth-skip{text-align:center;margin-top:8px;font-size:10px}
.auth-skip a{color:var(--hi);cursor:pointer;text-decoration:none}
.auth-skip a:hover{color:var(--mu)}

/* ═══ SYNC STATUS ══════════════════════════════════════════ */
.sync-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:10px;font-family:var(--fm);font-weight:600;cursor:default;transition:all .2s}
.sync-chip.cloud{background:rgba(37,99,235,.12);border:1px solid rgba(37,99,235,.25);color:#3b82f6}
.sync-chip.local{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.25);color:#d97706}
.sync-chip.syncing{background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.15);color:#60a5fa}
.sync-chip.syncing .sync-dot{animation:pulse 1.2s infinite}
.sync-chip.error{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.2);color:#ef4444}
.sync-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sync-chip.cloud .sync-dot{background:#3b82f6}
.sync-chip.local .sync-dot{background:#d97706}
.sync-chip.syncing .sync-dot{background:#60a5fa}
.sync-chip.error .sync-dot{background:#ef4444}
.user-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;font-size:10px;color:#93c5fd;font-family:var(--fm);cursor:pointer;transition:all .15s}
.user-chip:hover{background:rgba(255,255,255,.14)}
